; Add ambient background. If you are having performance issue, set to false to disable
ambient = true

; Enable tray. Click the tray to hide or show the game window
tray = true

; Set to true if you want to disable caching
nocache = false

; Keep browser web security on for Cloudflare / Turnstile compatibility.
; If another provider has cross-origin issues, you can set this to false.
web_security = false

; Optional UA compatibility tweak (only applied on EROLABS domains).
; Keep false by default to avoid UA/client-hints mismatch.
mask_electron_ua = false

; Uncomment the following lines to enable proxy 
; [proxy]
; host = localhost
; port = 8888
; username = 
; password = 
